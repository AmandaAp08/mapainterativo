<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoField — Inspeção de Trafos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1f2e47;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --gray: #6b7280;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'Sora', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* ── LOGIN ─────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 360px;
    text-align: center;
    box-shadow: 0 0 80px rgba(0,212,255,0.07);
  }
  .login-logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .login-title {
    font-size: 26px; font-weight: 700; margin-bottom: 6px;
  }
  .login-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 32px; }
  .login-card input {
    width: 100%; padding: 13px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px;
    font-family: var(--font-sans);
    outline: none; transition: border .2s;
    margin-bottom: 16px;
  }
  .login-card input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--accent);
    border: none; border-radius: 10px; color: #000;
    font-weight: 700; font-size: 15px; cursor: pointer;
    transition: opacity .2s, transform .1s;
    font-family: var(--font-sans);
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:active { transform: scale(.98); }

  /* ── APP SHELL ────────────────────────── */
  #app { display: flex; height: 100vh; }

  /* ── SIDEBAR ──────────────────────────── */
  #sidebar {
    width: 300px; min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 100;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo { font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
  .sidebar-title { font-weight: 700; font-size: 16px; }
  .user-badge {
    margin-left: auto;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: var(--accent); font-family: var(--font-mono);
    white-space: nowrap;
  }

  .stats-bar {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    padding: 12px 8px; text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 2px; }
  .s-total .stat-val { color: var(--accent); }
  .s-apto .stat-val { color: var(--green); }
  .s-napto .stat-val { color: var(--red); }
  .s-pend .stat-val { color: var(--yellow); }

  .sidebar-section { padding: 14px 16px 8px; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 10px; }

  .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .btn-sm {
    flex: 1; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .2s; font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.active { border-color: var(--accent); background: rgba(0,212,255,.08); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  /* Filter chips */
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .chip {
    padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; transition: all .15s; color: var(--text-dim);
  }
  .chip.active-all { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.08); }
  .chip.active-apto { border-color: var(--green); color: var(--green); background: rgba(34,197,94,.08); }
  .chip.active-napto { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.08); }
  .chip.active-pendente { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,.08); }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-wrap input {
    width: 100%; padding: 9px 14px 9px 36px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    outline: none; font-family: var(--font-sans); transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 14px; }

  /* List */
  #trafo-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  #trafo-list::-webkit-scrollbar { width: 4px; }
  #trafo-list::-webkit-scrollbar-track { background: transparent; }
  #trafo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .trafo-item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
    border: 1px solid transparent; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 10px;
  }
  .trafo-item:hover { background: var(--surface2); border-color: var(--border); }
  .trafo-item.selected { background: var(--surface2); border-color: var(--accent); }
  .trafo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-pendente { background: var(--yellow); }
  .dot-apto { background: var(--green); }
  .dot-napto { background: var(--red); }
  .trafo-ref { font-family: var(--font-mono); font-size: 12px; font-weight: 700; }
  .trafo-coords { font-size: 10px; color: var(--text-dim); }
  .trafo-status-badge { margin-left: auto; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .badge-pendente { background: rgba(245,158,11,.15); color: var(--yellow); }
  .badge-apto { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-napto { background: rgba(239,68,68,.15); color: var(--red); }

  /* ── MAP ──────────────────────────────── */
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* GPS button */
  #gps-btn {
    position: absolute; top: 16px; right: 16px; z-index: 500;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px;
    color: var(--text); font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: all .2s; font-family: var(--font-sans);
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  #gps-btn:hover { border-color: var(--accent); color: var(--accent); }
  #gps-btn.tracking { border-color: var(--green); color: var(--green); animation: pulse-border 2s infinite; }
  @keyframes pulse-border { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); } 50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); } }

  /* Toast */
  #toast {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px; font-size: 13px;
    z-index: 600; display: none; white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }

  /* ── MODAL ────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 1000; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; width: 420px; max-width: 95vw;
    box-shadow: 0 20px 80px rgba(0,0,0,.6);
    animation: modal-in .2s ease;
  }
  @keyframes modal-in { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .modal-tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .modal-ref { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .modal-coords { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: var(--font-mono); }
  .modal-close { background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; color: var(--text-dim); cursor: pointer; font-size: 16px; transition: all .15s; }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 10px; }
  .status-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .status-btn {
    padding: 14px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--surface2); cursor: pointer; transition: all .2s;
    font-family: var(--font-sans); font-size: 14px; font-weight: 700;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .status-btn .s-icon { font-size: 22px; }
  .status-btn.sel-apto { border-color: var(--green); background: rgba(34,197,94,.1); color: var(--green); }
  .status-btn.sel-napto { border-color: var(--red); background: rgba(239,68,68,.1); color: var(--red); }
  .status-btn:not(.sel-apto):not(.sel-napto):hover { border-color: var(--accent); }

  .modal-obs textarea {
    width: 100%; padding: 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; font-family: var(--font-sans);
    resize: vertical; min-height: 80px; outline: none; transition: border .2s;
  }
  .modal-obs textarea:focus { border-color: var(--accent); }

  /* parâmetros extras */
  .modal-params { margin-bottom: 20px; }
  .param-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .param-row input {
    flex: 1; padding: 9px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 12px; font-family: var(--font-sans); outline: none;
    transition: border .2s;
  }
  .param-row input:focus { border-color: var(--accent); }
  .param-del { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; color: var(--red); cursor: pointer; font-size: 14px; transition: all .15s; }
  .param-del:hover { background: rgba(239,68,68,.1); }
  .btn-add-param {
    background: none; border: 1px dashed var(--border); border-radius: 8px;
    padding: 8px 14px; color: var(--text-dim); font-size: 12px; cursor: pointer;
    transition: all .15s; font-family: var(--font-sans); width: 100%;
  }
  .btn-add-param:hover { border-color: var(--accent); color: var(--accent); }

  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; padding: 13px; background: var(--accent); border: none;
    border-radius: 10px; color: #000; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: opacity .2s; font-family: var(--font-sans);
  }
  .btn-save:hover { opacity: .85; }
  .btn-cancel {
    padding: 13px 20px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-dim); font-size: 14px;
    cursor: pointer; transition: all .2s; font-family: var(--font-sans);
  }
  .btn-cancel:hover { border-color: var(--border); color: var(--text); }

  /* ── LEAFLET MARKER OVERRIDES ─────────── */
  .trafo-marker {
    width: 24px !important; height: 24px !important;
    border-radius: 50%; border: 2px solid rgba(255,255,255,.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; cursor: pointer;
    transition: transform .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .trafo-marker:hover { transform: scale(1.3); }
  .m-pendente { background: var(--yellow); color: #000; }
  .m-apto { background: var(--green); color: #fff; }
  .m-napto { background: var(--red); color: #fff; }
  .user-marker { background: var(--accent); color: #000; font-size: 12px; border: 2px solid #fff; }

  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    color: var(--text) !important;
    font-family: var(--font-sans) !important;
    box-shadow: 0 8px 30px rgba(0,0,0,.5) !important;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-content { margin: 12px 16px !important; font-size: 13px !important; }
  .popup-ref { font-family: var(--font-mono); font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .popup-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; display: inline-block; margin-bottom: 6px; }
  .popup-btn {
    display: block; width: 100%; padding: 8px; background: var(--accent);
    border: none; border-radius: 6px; color: #000; font-weight: 700; font-size: 12px;
    cursor: pointer; margin-top: 8px; font-family: var(--font-sans);
  }

  /* Empty state */
  .empty-list { padding: 24px 16px; text-align: center; color: var(--text-dim); font-size: 13px; }
  .empty-list .e-icon { font-size: 28px; margin-bottom: 8px; }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; background: rgba(10,14,26,.9);
    z-index: 9998; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 2px; }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 768px) {
    #sidebar { width: 100%; min-width: 0; position: absolute; bottom: 0; left: 0; right: 0; height: 40vh; z-index: 200; border-right: none; border-top: 1px solid var(--border); }
    #app { flex-direction: column; }
    #map-container { flex: 1; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <div class="loader-text">CARREGANDO...</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GeoField</div>
    <div class="login-title">Inspeção de Trafos</div>
    <div class="login-sub">Digite seu nome para entrar no sistema</div>
    <input type="text" id="login-name" placeholder="Seu nome completo" maxlength="40" autocomplete="off"/>
    <button class="btn-primary" onclick="doLogin()">Entrar no Sistema →</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-logo">GeoField</div>
        <div class="sidebar-title">Trafos</div>
      </div>
      <div class="user-badge" id="user-badge">—</div>
    </div>

    <div class="stats-bar">
      <div class="stat-item s-total"><div class="stat-val" id="st-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat-item s-apto"><div class="stat-val" id="st-apto">0</div><div class="stat-label">Aptos</div></div>
      <div class="stat-item s-napto"><div class="stat-val" id="st-napto">0</div><div class="stat-label">N.Aptos</div></div>
      <div class="stat-item s-pend"><div class="stat-val" id="st-pend">0</div><div class="stat-label">Pendente</div></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Importar / Exportar</div>
      <div class="btn-row">
        <button class="btn-sm" onclick="document.getElementById('file-input').click()">📥 Importar XLSX</button>
        <button class="btn-sm" onclick="exportXLSX()">📤 Exportar</button>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="importXLSX(event)">
      </div>
      <div class="btn-row">
        <button class="btn-sm danger" onclick="clearAll()">🗑 Limpar base</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Filtrar</div>
      <div class="filter-chips">
        <span class="chip active-all" data-filter="todos" onclick="setFilter('todos',this)">Todos</span>
        <span class="chip" data-filter="pendente" onclick="setFilter('pendente',this)">Pendente</span>
        <span class="chip" data-filter="apto" onclick="setFilter('apto',this)">Apto</span>
        <span class="chip" data-filter="napto" onclick="setFilter('napto',this)">Não Apto</span>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom:4px">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar referência..." oninput="renderList()">
      </div>
    </div>

    <div id="trafo-list"></div>
  </div>

  <!-- MAP -->
  <div id="map-container">
    <div id="map"></div>
    <button id="gps-btn" onclick="toggleGPS()">📍 Minha Localização</button>
    <div id="toast"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-tag">Trafo</div>
        <div class="modal-ref" id="modal-ref">—</div>
        <div class="modal-coords" id="modal-coords">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-section-label">Status</div>
    <div class="status-buttons">
      <button class="status-btn" id="btn-apto" onclick="selectStatus('apto')">
        <span class="s-icon">✅</span><span>Apto</span>
      </button>
      <button class="status-btn" id="btn-napto" onclick="selectStatus('napto')">
        <span class="s-icon">❌</span><span>Não Apto</span>
      </button>
    </div>

    <div class="modal-params">
      <div class="modal-section-label">Parâmetros adicionais</div>
      <div id="params-container"></div>
      <button class="btn-add-param" onclick="addParam()">+ Adicionar parâmetro</button>
    </div>

    <div class="modal-obs">
      <div class="modal-section-label">Observação</div>
      <textarea id="modal-obs" placeholder="Digite observações sobre este trafo..."></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTrafo()">Salvar registro</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────
let trafos = [];          // {ref, lat, lng, status, obs, params, user, timestamp}
let currentFilter = 'todos';
let currentUser = '';
let map = null;
let markers = {};         // ref → leaflet marker
let selectedRef = null;
let gpsActive = false;
let gpsWatchId = null;
let userMarker = null;
let userCircle = null;
let currentModalRef = null;

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('loading').style.display = 'none', 600);
  const saved = localStorage.getItem('geofield_trafos');
  if (saved) { try { trafos = JSON.parse(saved); } catch(e){} }
  document.getElementById('login-name').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
});

function save() { localStorage.setItem('geofield_trafos', JSON.stringify(trafos)); }

// ─── LOGIN ─────────────────────────────────────────────────
function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  if (!name) { alert('Digite seu nome para entrar.'); return; }
  currentUser = name;
  document.getElementById('user-badge').textContent = name.split(' ')[0];
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initMap();
  renderAll();
}

// ─── MAP INIT ─────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([-4.5, -42.0], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
  renderMarkers();
}

// ─── MARKERS ──────────────────────────────────────────────
function makeIcon(status) {
  const cls = status === 'apto' ? 'm-apto' : status === 'napto' ? 'm-napto' : 'm-pendente';
  const sym = status === 'apto' ? '✓' : status === 'napto' ? '✗' : '?';
  return L.divIcon({ className: '', html: `<div class="trafo-marker ${cls}">${sym}</div>`, iconSize: [24,24], iconAnchor: [12,12] });
}

function renderMarkers() {
  if (!map) return;
  // clear old
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  trafos.forEach(t => {
    const m = L.marker([t.lat, t.lng], { icon: makeIcon(t.status) }).addTo(map);
    m.bindPopup(makePopup(t));
    m.on('click', () => openModal(t.ref));
    markers[t.ref] = m;
  });
}

function updateMarker(ref) {
  const t = trafos.find(x => x.ref === ref);
  if (!t || !map) return;
  if (markers[ref]) map.removeLayer(markers[ref]);
  const m = L.marker([t.lat, t.lng], { icon: makeIcon(t.status) }).addTo(map);
  m.bindPopup(makePopup(t));
  m.on('click', () => openModal(t.ref));
  markers[ref] = m;
}

function makePopup(t) {
  const statusColor = t.status === 'apto' ? '#22c55e' : t.status === 'napto' ? '#ef4444' : '#f59e0b';
  const label = t.status === 'apto' ? 'Apto' : t.status === 'napto' ? 'Não Apto' : 'Pendente';
  return `<div class="popup-ref">${t.ref}</div>
    <span class="popup-status" style="background:${statusColor}22;color:${statusColor}">${label}</span>
    ${t.obs ? `<div style="font-size:12px;color:#94a3b8;margin-top:4px">${t.obs.substring(0,60)}${t.obs.length>60?'…':''}</div>` : ''}
    <button class="popup-btn" onclick="openModal('${t.ref}')">Editar registro</button>`;
}

// ─── RENDER ALL ────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderList();
  if (map) renderMarkers();
}

function renderStats() {
  document.getElementById('st-total').textContent = trafos.length;
  document.getElementById('st-apto').textContent = trafos.filter(t=>t.status==='apto').length;
  document.getElementById('st-napto').textContent = trafos.filter(t=>t.status==='napto').length;
  document.getElementById('st-pend').textContent = trafos.filter(t=>t.status==='pendente').length;
}

function renderList() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  let list = trafos.filter(t => {
    if (currentFilter !== 'todos' && t.status !== currentFilter) return false;
    if (q && !String(t.ref).toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('trafo-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty-list"><div class="e-icon">📭</div><div>Nenhum trafo encontrado</div></div>`;
    return;
  }
  el.innerHTML = list.slice(0, 200).map(t => {
    const dotCls = t.status === 'apto' ? 'dot-apto' : t.status === 'napto' ? 'dot-napto' : 'dot-pendente';
    const badgeCls = t.status === 'apto' ? 'badge-apto' : t.status === 'napto' ? 'badge-napto' : 'badge-pendente';
    const badgeLabel = t.status === 'apto' ? 'Apto' : t.status === 'napto' ? 'N.Apto' : 'Pendente';
    return `<div class="trafo-item${t.ref===selectedRef?' selected':''}" onclick="focusTrafo('${t.ref}')">
      <div class="trafo-dot ${dotCls}"></div>
      <div>
        <div class="trafo-ref">${t.ref}</div>
        <div class="trafo-coords">${t.lat.toFixed(5)}, ${t.lng.toFixed(5)}</div>
      </div>
      <div class="trafo-status-badge ${badgeCls}">${badgeLabel}</div>
    </div>`;
  }).join('');
  if (list.length > 200) el.innerHTML += `<div class="empty-list" style="font-size:11px">+${list.length-200} ocultos — use a busca</div>`;
}

function focusTrafo(ref) {
  selectedRef = ref;
  const t = trafos.find(x => x.ref === ref);
  if (!t || !map) return;
  map.setView([t.lat, t.lng], 16);
  if (markers[ref]) markers[ref].openPopup();
  renderList();
}

// ─── FILTER ────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => {
    c.className = 'chip';
    if (c.dataset.filter === f) c.classList.add('active-' + (f==='todos'?'all':f));
  });
  renderList();
}

// ─── MODAL ─────────────────────────────────────────────────
function openModal(ref) {
  const t = trafos.find(x => x.ref === ref);
  if (!t) return;
  currentModalRef = ref;
  document.getElementById('modal-ref').textContent = t.ref;
  document.getElementById('modal-coords').textContent = `${t.lat.toFixed(6)}, ${t.lng.toFixed(6)}`;
  document.getElementById('modal-obs').value = t.obs || '';

  // status buttons
  document.getElementById('btn-apto').className = 'status-btn' + (t.status==='apto' ? ' sel-apto' : '');
  document.getElementById('btn-napto').className = 'status-btn' + (t.status==='napto' ? ' sel-napto' : '');

  // params
  const pc = document.getElementById('params-container');
  pc.innerHTML = '';
  (t.params || []).forEach((p,i) => addParam(p.key, p.val));

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentModalRef = null;
}

function selectStatus(s) {
  document.getElementById('btn-apto').className = 'status-btn' + (s==='apto'?' sel-apto':'');
  document.getElementById('btn-napto').className = 'status-btn' + (s==='napto'?' sel-napto':'');
}

function getSelectedStatus() {
  if (document.getElementById('btn-apto').classList.contains('sel-apto')) return 'apto';
  if (document.getElementById('btn-napto').classList.contains('sel-napto')) return 'napto';
  return 'pendente';
}

function addParam(key='', val='') {
  const pc = document.getElementById('params-container');
  const row = document.createElement('div');
  row.className = 'param-row';
  row.innerHTML = `<input type="text" placeholder="Parâmetro" value="${key}" class="p-key">
    <input type="text" placeholder="Valor" value="${val}" class="p-val">
    <button class="param-del" onclick="this.parentElement.remove()">✕</button>`;
  pc.appendChild(row);
}

function saveTrafo() {
  if (!currentModalRef) return;
  const idx = trafos.findIndex(x => x.ref === currentModalRef);
  if (idx < 0) return;
  trafos[idx].status = getSelectedStatus();
  trafos[idx].obs = document.getElementById('modal-obs').value;
  trafos[idx].user = currentUser;
  trafos[idx].timestamp = new Date().toISOString();
  const rows = document.querySelectorAll('#params-container .param-row');
  trafos[idx].params = Array.from(rows).map(r => ({
    key: r.querySelector('.p-key').value,
    val: r.querySelector('.p-val').value
  })).filter(p => p.key);
  save();
  updateMarker(currentModalRef);
  renderStats();
  renderList();
  closeModal();
  showToast(`✅ Trafo ${currentModalRef} salvo como "${trafos[idx].status}"`);
}

// ─── GPS ───────────────────────────────────────────────────
function toggleGPS() {
  if (!gpsActive) startGPS(); else stopGPS();
}
function startGPS() {
  if (!navigator.geolocation) { showToast('❌ GPS não suportado neste dispositivo'); return; }
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;
    if (!userMarker) {
      userMarker = L.marker([lat,lng], {
        icon: L.divIcon({ className:'', html:'<div class="trafo-marker user-marker">👤</div>', iconSize:[24,24], iconAnchor:[12,12] })
      }).addTo(map).bindPopup(`<b>Você</b><br>Precisão: ${Math.round(acc)}m`);
      userCircle = L.circle([lat,lng], { radius: acc, color: '#00d4ff', fillOpacity: .08, weight: 1 }).addTo(map);
      map.setView([lat,lng], 14);
    } else {
      userMarker.setLatLng([lat,lng]);
      userCircle.setLatLng([lat,lng]);
      userCircle.setRadius(acc);
    }
  }, err => { showToast('❌ Erro ao obter localização'); stopGPS(); }, { enableHighAccuracy: true });
  gpsActive = true;
  document.getElementById('gps-btn').classList.add('tracking');
  document.getElementById('gps-btn').textContent = '🟢 GPS Ativo';
}
function stopGPS() {
  if (gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
  gpsActive = false;
  document.getElementById('gps-btn').classList.remove('tracking');
  document.getElementById('gps-btn').innerHTML = '📍 Minha Localização';
}

// ─── IMPORT XLSX ──────────────────────────────────────────
function importXLSX(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (rows.length < 2) { showToast('❌ Planilha vazia ou inválida'); return; }
      // detect columns
      const header = rows[0].map(h => String(h).trim().toUpperCase());
      let refCol = -1, latCol = -1, lngCol = -1;
      header.forEach((h,i) => {
        if (/REF|MF|INSTALL|TRAFO|ID|COD/.test(h)) refCol = refCol < 0 ? i : refCol;
        if (/LAT/.test(h)) latCol = i;
        if (/LON|LNG/.test(h)) lngCol = i;
      });
      // fallback: positional
      if (refCol < 0) refCol = 0;
      if (latCol < 0) latCol = 1;
      if (lngCol < 0) lngCol = 2;
      let added = 0, skipped = 0;
      rows.slice(1).forEach(row => {
        const ref = String(row[refCol] || '').trim();
        const lat = parseFloat(row[latCol]);
        const lng = parseFloat(row[lngCol]);
        if (!ref || isNaN(lat) || isNaN(lng)) { skipped++; return; }
        if (!trafos.find(t => t.ref === ref)) {
          trafos.push({ ref, lat, lng, status: 'pendente', obs: '', params: [], user: '', timestamp: '' });
          added++;
        } else { skipped++; }
      });
      save();
      renderAll();
      showToast(`✅ ${added} trafos importados (${skipped} ignorados)`);
      if (trafos.length > 0) {
        const first = trafos[0];
        map.setView([first.lat, first.lng], 10);
      }
    } catch(err) { showToast('❌ Erro ao ler arquivo: ' + err.message); }
  };
  reader.readAsBinaryString(file);
  event.target.value = '';
}

// ─── EXPORT XLSX ──────────────────────────────────────────
function exportXLSX() {
  if (!trafos.length) { showToast('❌ Nenhum dado para exportar'); return; }
  // collect all param keys
  const allParamKeys = [...new Set(trafos.flatMap(t => (t.params||[]).map(p=>p.key)))];
  const rows = trafos.map(t => {
    const row = {
      'REFERÊNCIA': t.ref,
      'LATITUDE': t.lat,
      'LONGITUDE': t.lng,
      'STATUS': t.status === 'apto' ? 'Apto' : t.status === 'napto' ? 'Não Apto' : 'Pendente',
      'OBSERVAÇÃO': t.obs || '',
      'TÉCNICO': t.user || '',
      'DATA_HORA': t.timestamp ? new Date(t.timestamp).toLocaleString('pt-BR') : ''
    };
    allParamKeys.forEach(k => {
      const p = (t.params||[]).find(x=>x.key===k);
      row[`PARAM_${k}`] = p ? p.val : '';
    });
    return row;
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inspeção');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `inspecao_trafos_${date}.xlsx`);
  showToast('📤 Exportação concluída!');
}

// ─── CLEAR ─────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Tem certeza que deseja limpar toda a base? Esta ação não pode ser desfeita.')) return;
  trafos = [];
  save();
  renderAll();
  showToast('🗑 Base limpa');
}

// ─── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 3000);
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
</script>
